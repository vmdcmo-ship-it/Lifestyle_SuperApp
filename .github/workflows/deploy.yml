name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - main-api
          - web
          - user-service

env:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}
  DEPLOY_PATH: /opt/lifestyle-superapp

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.service }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync code to VPS
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='dist' \
            ./ ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Deploy on VPS
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} << 'DEPLOY'
          cd ${{ env.DEPLOY_PATH }}

          # Đảm bảo .env tồn tại (GitHub Actions dùng .env, rsync exclude nó)
          if [ ! -f .env ] && [ -f infrastructure/.env.production ]; then
            echo ">>> Tạo .env từ infrastructure/.env.production (cho deploy workflow)..."
            cp infrastructure/.env.production .env
          fi
          if [ ! -f .env ]; then
            echo "::error::Thiếu .env trên VPS. Tạo từ: cp infrastructure/.env.production .env"
            exit 1
          fi

          SERVICE="${{ github.event.inputs.service }}"

          if [ "$SERVICE" = "all" ] || [ "$SERVICE" = "main-api" ]; then
            echo ">>> Rebuilding main-api (--no-cache để URL content/news/training dùng vmd.asia)..."
            docker compose -f infrastructure/docker/docker-compose.production.yml \
              --env-file .env build --no-cache main-api
            docker compose -f infrastructure/docker/docker-compose.production.yml \
              --env-file .env up -d main-api
            echo ">>> Chạy Prisma migrate (trong main-api container)..."
            sleep 5
            docker exec lifestyle_main_api npx prisma migrate deploy 2>/dev/null || echo "Prisma migrate skip (chạy thủ công khi cần)"
          fi

          if [ "$SERVICE" = "all" ] || [ "$SERVICE" = "web" ]; then
            echo ">>> Rebuilding web (--no-cache để sitemap/canonical dùng đúng domain)..."
            docker compose -f infrastructure/docker/docker-compose.production.yml \
              --env-file .env build --no-cache web
            docker compose -f infrastructure/docker/docker-compose.production.yml \
              --env-file .env up -d web
          fi

          echo ">>> Checking container status..."
          docker compose -f infrastructure/docker/docker-compose.production.yml --env-file .env ps

          echo ">>> Deploy completed!"
          DEPLOY

      - name: Health Check
        run: |
          sleep 20
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} << 'CHECK'
          echo ">>> Health check main-api (qua nginx port 80)..."
          curl -sf http://localhost/api/v1/health && echo " OK" || echo "main-api health check failed"
          echo ">>> Health check web (trong container)..."
          docker exec lifestyle_web wget -qO- http://localhost:3001 2>/dev/null | head -1 || echo "web health check failed"
          echo ">>> Container logs (main-api last 15 lines)..."
          docker logs lifestyle_main_api --tail 15 2>&1
          CHECK

      - name: Notify on failure
        if: failure()
        run: echo "::error::Deployment failed for ${{ github.event.inputs.service }}"
