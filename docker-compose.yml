# =============================================================================
# Lifestyle Super App - Docker Compose (Local Development)
# =============================================================================
# Usage:
#   docker compose up -d          → Start all services
#   docker compose down           → Stop all services
#   docker compose logs -f db     → View database logs
#   docker compose ps             → Check running services
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 - Primary Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: lifestyle_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lifestyle_db
      POSTGRES_USER: lifestyle_admin
      POSTGRES_PASSWORD: Lifestyle@2026!
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Asia/Ho_Chi_Minh
    volumes:
      # Persistent data
      - postgres_data:/var/lib/postgresql/data
      # Init scripts (auto-run on first startup, alphabetical order)
      - ./infrastructure/docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifestyle_admin -d lifestyle_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lifestyle_network

  # ---------------------------------------------------------------------------
  # pgAdmin 4 - Database Management UI
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lifestyle_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lifestyle.vn
      PGADMIN_DEFAULT_PASSWORD: Admin@2026!
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lifestyle_network

  # ---------------------------------------------------------------------------
  # Redis 7 - Cache & Session Store (Bonus - sẽ dùng sau)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: lifestyle_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass Redis@2026!
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Redis@2026!", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lifestyle_network

# =============================================================================
# Volumes (Persistent Storage)
# =============================================================================
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  redis_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  lifestyle_network:
    driver: bridge
