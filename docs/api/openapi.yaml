  # --- Webhooks ---

  /payments/vnpay-callback:
    get:
      tags: [Payments]
      summary: VNPay Return URL (redirect user)
      description: URL mà VNPay redirect user về sau khi thanh toán.
      security: []
      parameters:
        - name: vnp_TxnRef
          in: query
          schema:
            type: string
        - name: vnp_ResponseCode
          in: query
          schema:
            type: string
        - name: vnp_SecureHash
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect về app

  /payments/vnpay-ipn:
    post:
      tags: [Payments]
      summary: VNPay IPN Webhook
      description: |
        **Server-to-server callback.**  
        VNPay gọi endpoint này khi giao dịch hoàn thành.
        Phải verify signature trước khi xử lý.
      security: []
      requestBody:
        content:
          application/json:
            example:
              vnp_TxnRef: "LS-TXN-260216-789012"
              vnp_Amount: "50000000"
              vnp_ResponseCode: "00"
              vnp_TransactionNo: "14128963"
              vnp_SecureHash: "abc123..."
      responses:
        '200':
          description: |
            Trả về RspCode cho VNPay
          content:
            application/json:
              example:
                RspCode: "00"
                Message: "Confirm Success"

  /payments/sepay-webhook:
    post:
      tags: [Payments]
      summary: SePay Webhook - Nhận thông báo nạp tiền qua chuyển khoản
      description: |
        **SePay gọi endpoint này** khi phát hiện giao dịch chuyển khoản đến tài khoản công ty.
        
        Flow:
        1. User chuyển khoản với nội dung: `LS260216789013`
        2. SePay detect giao dịch, gọi webhook này
        3. Server parse nội dung chuyển khoản → match transaction
        4. Cộng tiền vào ví user
        
        **Security:** Verify webhook bằng API Key trong header.
      security:
        - SepayWebhookKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SepayWebhookPayload'
            example:
              id: 90242
              gateway: "MBBank"
              transactionDate: "2026-02-16 10:30:00"
              accountNumber: "0123456789"
              subAccount: null
              transferType: "in"
              transferAmount: 1000000
              accumulated: 15000000
              code: null
              content: "LS260216789013 NGUYEN VAN A chuyen tien"
              referenceCode: "FT26047123456"
              description: "LS260216789013 NGUYEN VAN A chuyen tien"
      responses:
        '200':
          description: Webhook đã xử lý
          content:
            application/json:
              example:
                success: true
                message: "Transaction processed"
                data:
                  transactionRef: "LS-TXN-260216-789013"
                  matchedAmount: 1000000
                  walletUpdated: true
        '400':
          description: Không match được giao dịch
          content:
            application/json:
              example:
                success: false
                error:
                  code: "NO_MATCHING_TRANSACTION"
                  message: "Không tìm thấy giao dịch phù hợp"
        '401':
          description: API Key không hợp lệ

  /payments/momo-ipn:
    post:
      tags: [Payments]
      summary: MoMo IPN Webhook
      description: MoMo gọi khi giao dịch hoàn thành.
      security: []
      requestBody:
        content:
          application/json:
            example:
