              example:
                success: true
                data:
                  balance: 12500
                  earnedTotal: 45000
                  spentTotal: 32500
                  expiringSoon: 2000
                  expiringDate: "2026-03-31"

  /loyalty/xu/history:
    get:
      tags: [Loyalty]
      summary: Lịch sử tích/tiêu Xu
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [EARN, SPEND, BONUS, EXPIRED]
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Lịch sử Xu

  /loyalty/referral:
    get:
      tags: [Loyalty]
      summary: Thông tin mã giới thiệu
      responses:
        '200':
          description: Referral info
          content:
            application/json:
              example:
                success: true
                data:
                  referralCode: "LS8068F741"
                  referralLink: "https://lifestyle.vn/ref/LS8068F741"
                  totalReferred: 5
                  totalEarned: 250000
                  reward:
                    referrer: "50,000 Xu"
                    referee: "30,000 Xu + Giảm 20% chuyến đầu"

  /loyalty/referral/apply:
    post:
      tags: [Loyalty]
      summary: Áp dụng mã giới thiệu
      requestBody:
        required: true
        content:
          application/json:
            example:
              referralCode: "LS8068F741"
      responses:
        '200':
          description: Mã giới thiệu đã áp dụng

  # ===========================================================================
  # ADMIN (Ops Dashboard)
  # ===========================================================================

  /admin/users:
    get:
      tags: [Admin]
      summary: "[Admin] Danh sách users"
      description: Xem, tìm kiếm, lọc tất cả users. Yêu cầu role ADMIN.
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [CUSTOMER, DRIVER, RESTAURANT_OWNER, SELLER, ADMIN]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
        - name: search
          in: query
          description: Tìm theo tên, email, SĐT
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Danh sách users
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/drivers/pending:
    get:
      tags: [Admin]
      summary: "[Admin] Tài xế chờ duyệt"
      responses:
        '200':
          description: Danh sách tài xế pending

  /admin/drivers/{driverId}/verify:
    parameters:
      - name: driverId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Admin]
      summary: "[Admin] Duyệt/Từ chối tài xế"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [APPROVE, REJECT]
                rejectionReason:
                  type: string
            example:
              action: "APPROVE"
      responses:
        '200':
          description: Đã xử lý

  /admin/merchants/pending:
    get:
      tags: [Admin]
      summary: "[Admin] Cửa hàng chờ duyệt"
      responses:
        '200':
          description: Danh sách merchant pending

  /admin/spotlight/moderation:
    get:
      tags: [Admin]
      summary: "[Admin] Nội dung chờ duyệt (Redcomments & Reviews)"
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [REDCOMMENT, REVIEW]
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING_REVIEW]
            default: PENDING_REVIEW
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Queue nội dung chờ duyệt

  /admin/spotlight/{contentId}/moderate:
    parameters:
      - name: contentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Admin]
      summary: "[Admin] Duyệt/Từ chối nội dung Spotlight"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [APPROVE, REJECT]
                rejectionReason:
                  type: string
                  enum: [INAPPROPRIATE_CONTENT, FALSE_INFORMATION, POOR_QUALITY, COPYRIGHT_VIOLATION, SPAM, OFFENSIVE_LANGUAGE]
                rejectionNote:
                  type: string
            example:
              action: "APPROVE"
      responses:
        '200':
          description: Đã xử lý

  /admin/dashboard/stats:
    get:
      tags: [Admin]
      summary: "[Admin] Tổng quan dashboard"
      responses:
        '200':
          description: Thống kê tổng quan
          content:
            application/json:
              example:
                success: true
                data:
                  users:
                    total: 15000
                    newToday: 45
                    activeToday: 3200
                  drivers:
                    total: 500
                    online: 120
                    pendingVerification: 15
                  merchants:
                    total: 200
                    active: 180
                    pendingApproval: 8
                  transactions:
                    todayVolume: 250000000
                    todayCount: 1500
                    totalBalance: 5000000000
                  spotlight:
                    totalRedcomments: 500
                    pendingReview: 12
                    totalCreators: 50

# =============================================================================
# COMPONENTS
# =============================================================================
components:

  # ---------------------------------------------------------------------------
  # Security Schemes
  # ---------------------------------------------------------------------------
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT Access Token. Lấy từ `/auth/login` hoặc `/auth/register`.
        ```
        Authorization: Bearer eyJhbGciOiJIUzI1NiIs...
        ```
    SepayWebhookKey:
      type: apiKey
      in: header
      name: X-Sepay-Key
      description: API Key xác thực webhook từ SePay

  # ---------------------------------------------------------------------------
  # Parameters (Reusable)
  # ---------------------------------------------------------------------------
  parameters:
    Page:
      name: page
      in: query
      description: Số trang (bắt đầu từ 1)
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      description: Số item mỗi trang
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    MerchantId:
      name: merchantId
      in: path
      required: true
      description: Merchant UUID
      schema:
        type: string
        format: uuid

  # ---------------------------------------------------------------------------
  # Responses (Reusable)
  # ---------------------------------------------------------------------------
  responses:
    Unauthorized:
      description: Chưa đăng nhập hoặc token hết hạn
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: "UNAUTHORIZED"
              message: "Token không hợp lệ hoặc đã hết hạn"
              statusCode: 401
    Forbidden:
      description: Không có quyền truy cập
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: "FORBIDDEN"
              message: "Bạn không có quyền thực hiện thao tác này"
              statusCode: 403
    ValidationError:
      description: Dữ liệu không hợp lệ
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: "VALIDATION_ERROR"
              message: "Dữ liệu không hợp lệ"
              statusCode: 400
              details:
                email: "Email không đúng định dạng"
                password: "Mật khẩu phải có ít nhất 8 ký tự"
    NotFound:
      description: Không tìm thấy
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: "NOT_FOUND"
              message: "Không tìm thấy tài nguyên"
              statusCode: 404

  # ---------------------------------------------------------------------------
  # Schemas (Data Models)
  # ---------------------------------------------------------------------------
  schemas:
  
    # --- Error ---
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            statusCode:
              type: integer
            details:
              type: object

    # --- Auth ---
    RegisterRequest:
      type: object
      required: [password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
          example: "nguyenvana@gmail.com"
        phoneNumber:
          type: string
          pattern: '^0[0-9]{9}$'
          example: "0901234567"
        password:
          type: string
          minLength: 8
          description: "Tối thiểu 8 ký tự, có chữ hoa + số + ký tự đặc biệt"
        firstName:
          type: string
          example: "Nguyễn Văn"
        lastName:
          type: string
          example: "A"
        referralCode:
          type: string
          description: Mã giới thiệu (optional)
          example: "LS8068F741"

    LoginRequest:
      type: object
      required: [password]
      properties:
        email:
          type: string
          format: email
        phoneNumber:
          type: string
        password:
          type: string

    SocialLoginRequest:
      type: object
      required: [provider, accessToken]
      properties:
        provider:
          type: string
          enum: [google, facebook, apple, zalo]
        accessToken:
          type: string
          description: Access token từ provider

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/UserSummary'
            accessToken:
              type: string
              example: "eyJhbGciOiJIUzI1NiIs..."
            refreshToken:
              type: string
              example: "eyJhbGciOiJIUzI1NiIs..."
            expiresIn:
              type: integer
              description: Access token TTL (seconds)
              example: 3600

    # --- User ---
    UserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        phoneNumber:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
        role:
          type: string
          enum: [CUSTOMER, DRIVER, RESTAURANT_OWNER, SELLER, ADMIN]
        ekycLevel:
          type: string
          enum: [LEVEL_0, LEVEL_1, LEVEL_2, LEVEL_3]
        isActive:
          type: boolean

    UserProfileResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          allOf:
            - $ref: '#/components/schemas/UserSummary'
            - type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                gender:
                  type: string
                  enum: [MALE, FEMALE, OTHER]
                dateOfBirth:
                  type: string
                  format: date
                referralCode:
                  type: string
                xuBalance:
                  type: integer
                walletBalance:
                  type: integer
                preferences:
                  $ref: '#/components/schemas/UserPreferences'
                createdAt:
                  type: string
                  format: date-time

    UpdateProfileRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        displayName:
          type: string
        gender:
          type: string
          enum: [MALE, FEMALE, OTHER]
        dateOfBirth:
          type: string
          format: date

    UserPreferences:
      type: object
      properties:
        language:
          type: string
          enum: [vi, en]
          default: vi
        currency:
          type: string
          enum: [VND, USD]
          default: VND
        theme:
          type: string
          enum: [LIGHT, DARK, AUTO]
          default: AUTO
        notifications:
          type: object
          properties:
            email:
              type: boolean
            push:
              type: boolean
            sms:
              type: boolean

    CreateAddressRequest:
      type: object
      required: [label, street, city, latitude, longitude]
      properties:
        label:
          type: string
          example: "Nhà"
        street:
          type: string
        ward:
          type: string
        district:
          type: string
        city:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        isDefault:
          type: boolean
          default: false

    # --- Driver ---
    DriverProfileResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            driverNumber:
              type: string
              example: "LS-DRV-00001"
            status:
              type: string
              enum: [PENDING_VERIFICATION, ACTIVE, INACTIVE, SUSPENDED, BANNED]
            onlineStatus:
              type: string
              enum: [ONLINE, OFFLINE, BUSY]
            rating:
              type: number
              example: 4.85
            totalTrips:
              type: integer
            totalEarnings:
              type: integer
            currentBalance:
              type: integer
            onboardingStep:
              type: integer
            onboardingCompleted:
              type: boolean
            vehicle:
              type: object
              properties:
                vehicleType:
                  type: string
                licensePlate:
                  type: string
                brand:
                  type: string
                model:
                  type: string
                color:
                  type: string

    DriverIdentityRequest:
      type: object
      required: [citizenId, citizenIdFrontImage, citizenIdBackImage, faceImage, driverLicenseNumber, driverLicenseImage]
      properties:
        citizenId:
          type: string
          example: "079090012345"
        citizenIdIssueDate:
          type: string
          format: date
        citizenIdIssuePlace:
          type: string
        citizenIdFrontImage:
          type: string
          format: binary
        citizenIdBackImage:
          type: string
          format: binary
        faceImage:
          type: string
          format: binary
        driverLicenseNumber:
          type: string
        driverLicenseClass:
          type: string
          enum: [A1, A2, B1, B2, C, D, E, F]
        driverLicenseIssueDate:
          type: string
          format: date
        driverLicenseExpiry:
          type: string
          format: date
        driverLicenseImage:
          type: string
          format: binary
        criminalRecordNumber:
          type: string
        criminalRecordIssueDate:
          type: string
          format: date
        criminalRecordImage:
          type: string
          format: binary

    VehicleRegistrationRequest:
      type: object
      required: [vehicleType, licensePlate, brand, model, year, color]
      properties:
        vehicleType:
          type: string
          enum: [BIKE, CAR_4_SEATS, CAR_7_SEATS, TRUCK]
        licensePlate:
          type: string
          example: "59F1-12345"
        brand:
          type: string
          example: "Honda"
        model:
          type: string
          example: "Wave RSX"
        year:
          type: integer
          example: 2022
        color:
          type: string
          example: "Đỏ"
        frontImage:
          type: string
          format: binary
        backImage:
          type: string
          format: binary
        leftImage:
          type: string
          format: binary
        rightImage:
          type: string
          format: binary
        plateCloseupImage:
          type: string
          format: binary
        registrationNumber:
          type: string
        registrationImage:
          type: string
          format: binary
        insuranceNumber:
          type: string
        insuranceProvider:
          type: string
        insuranceImage:
          type: string
          format: binary

    # --- Merchant ---
    MerchantRegisterRequest:
      type: object
      required: [name, type, phone, street, district, city, latitude, longitude]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [RESTAURANT, CAFE, FOOD_STALL, SUPERMARKET, CONVENIENCE_STORE, GROCERY, BAKERY, PHARMACY, FASHION, ELECTRONICS, BEAUTY, OTHER]
        description:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        street:
          type: string
        ward:
          type: string
        district:
          type: string
        city:
          type: string
        latitude:
          type: number
        longitude:
          type: number

    MerchantPublicProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        merchantNumber:
          type: string
        name:
          type: string
        slug:
          type: string
        type:
          type: string
        description:
          type: string
        logoUrl:
          type: string
        coverImages:
          type: array
          items:
            type: string
        phone:
          type: string
        fullAddress:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        businessHours:
          type: object
        rating:
          type: object
          properties:
            overall:
              type: number
            totalReviews:
              type: integer
        followerCount:
          type: integer
        isVerified:
          type: boolean
        isOpen:
          type: boolean

    UpdateMerchantRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        phone:
          type: string
        email:
          type: string

    # --- Wallet & Payment ---
    WalletResponse:
      type: object
      properties:
        walletNumber:
          type: string
        balance:
          type: integer
          description: Số dư VND
        reservedBalance:
          type: integer
        xuBalance:
          type: integer
        currency:
          type: string
        status:
          type: string
          enum: [ACTIVE, FROZEN, SUSPENDED, CLOSED]

    TopUpRequest:
      type: object
      required: [amount, paymentMethod]
      properties:
        amount:
          type: integer
          minimum: 10000
          maximum: 50000000
          description: Số tiền nạp (VND)
        paymentMethod:
          type: string
          enum: [VNPAY, MOMO, ZALOPAY, BANK_TRANSFER]
        returnUrl:
          type: string
          description: URL redirect sau khi thanh toán

    PaymentRequest:
      type: object
      required: [orderId, amount, paymentMethod]
      properties:
        orderId:
          type: string
          format: uuid
        amount:
          type: integer
        paymentMethod:
          type: string
          enum: [WALLET, VNPAY, MOMO, ZALOPAY, COD, XU]
        note:
          type: string

    WithdrawRequest:
      type: object
      required: [amount, bankAccountId]
      properties:
        amount:
          type: integer
          minimum: 50000
          description: Số tiền rút (VND, tối thiểu 50,000)
        bankAccountId:
          type: string
          format: uuid
        note:
          type: string

    SepayWebhookPayload:
      type: object
      description: |
        Payload từ SePay khi detect giao dịch chuyển khoản.
        Docs: https://docs.sepay.vn
      properties:
        id:
          type: integer
          description: ID giao dịch trên SePay
        gateway:
          type: string
          description: Tên ngân hàng
          example: "MBBank"
        transactionDate:
          type: string
          description: Thời gian giao dịch
          example: "2026-02-16 10:30:00"
        accountNumber:
          type: string
          description: STK nhận tiền
          example: "0123456789"
        subAccount:
          type: string
          nullable: true
        transferType:
          type: string
          enum: [in, out]
          description: in=nhận tiền, out=chuyển đi
        transferAmount:
          type: integer
          description: Số tiền
          example: 1000000
        accumulated:
          type: integer
          description: Số dư tích lũy
        code:
          type: string
          nullable: true
        content:
          type: string
          description: Nội dung chuyển khoản (chứa mã giao dịch)
          example: "LS260216789013 NGUYEN VAN A chuyen tien"
        referenceCode:
          type: string
          description: Mã tham chiếu từ ngân hàng
        description:
          type: string
          description: Mô tả đầy đủ

    # --- Spotlight ---
    CreateRedcommentRequest:
      type: object
      required: [format, title, targetType, targetName, overallRating]
      properties:
        format:
          type: string
          enum: [VIDEO_REEL, ARTICLE, PHOTO_ESSAY, COMPARISON]
        title:
          type: string
          maxLength: 300
        description:
          type: string
          maxLength: 500
        video:
          type: string
          format: binary
          description: Video file (cho VIDEO_REEL)
        photos:
          type: array
          items:
            type: string
            format: binary
          description: Ảnh (cho PHOTO_ESSAY)
        coverImage:
          type: string
          format: binary
        targetType:
          type: string
          enum: [PRODUCT, RESTAURANT, CAFE, HOTEL, TRAVEL, INSURANCE, EVENT, EXPERIENCE]
        targetId:
          type: string
          format: uuid
        targetName:
          type: string
        targetTags:
          type: array
          items:
            type: string
        merchantId:
          type: string
          format: uuid
        overallRating:
          type: number
          minimum: 1
          maximum: 5
        ctaButtons:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
              action:
                type: string
                enum: [BOOK, CONSULT, BUY, CALL, EXTERNAL_LINK]
              targetUrl:
                type: string

    ReelsFeedResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              redcommentNumber:
                type: string
              creator:
                type: object
              format:
                type: string
              title:
                type: string
              videoUrl:
                type: string
              thumbnailUrl:
                type: string
              targetType:
                type: string
              overallRating:
                type: number
              views:
                type: integer
              likes:
                type: integer
              isLiked:
                type: boolean
              ctaButtons:
                type: array
                items:
                  type: object
        nextCursor:
          type: string
        hasMore:
          type: boolean

    CreateReviewRequest:
      type: object
      required: [targetType, targetName, overallRating, body]
      properties:
        targetType:
          type: string
          enum: [PRODUCT, RESTAURANT, CAFE, HOTEL, TRAVEL, INSURANCE, EVENT, EXPERIENCE]
        targetId:
          type: string
          format: uuid
        targetName:
          type: string
        merchantId:
          type: string
          format: uuid
        overallRating:
          type: number
          minimum: 1
          maximum: 5
        title:
          type: string
          maxLength: 200
        body:
          type: string
        photos:
          type: array
          items:
            type: string
            format: binary
        video:
          type: string
          format: binary
