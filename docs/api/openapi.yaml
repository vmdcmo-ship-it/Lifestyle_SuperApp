openapi: 3.0.3
info:
  title: Lifestyle Super App API
  description: |
    ## 🚀 Lifestyle Super App - REST API Documentation
    
    **Base URL:** `https://api.lifestyle.vn/v1`  
    **Local Dev:** `http://localhost:3000/api/v1`
    
    ### Authentication
    Hầu hết endpoints yêu cầu JWT Bearer token:
    ```
    Authorization: Bearer <access_token>
    ```
    
    ### Response Format
    ```json
    {
      "success": true,
      "data": { ... },
      "message": "Success",
      "meta": { "page": 1, "limit": 20, "total": 100 }
    }
    ```
    
    ### Error Format
    ```json
    {
      "success": false,
      "error": {
        "code": "VALIDATION_ERROR",
        "message": "Email is required",
        "statusCode": 400
      }
    }
    ```
    
    ### Modules
    | Module | Prefix | Description |
    |--------|--------|-------------|
    | Auth | `/auth` | Đăng ký, Đăng nhập, Token |
    | Users | `/users` | Hồ sơ, Địa chỉ, Preferences |
    | Drivers | `/drivers` | Đăng ký tài xế, Xe, Giấy tờ |
    | Merchants | `/merchants` | Cửa hàng, Nhân viên |
    | Wallets | `/wallets` | Ví, Nạp tiền, Rút tiền |
    | Payments | `/payments` | Thanh toán, Webhooks |
    | Spotlight | `/spotlight` | Redcomments, Reviews, Creators |
    | Loyalty | `/loyalty` | Xu, Referral |

  version: 1.0.0
  contact:
    name: Lifestyle Super App Team
    email: dev@lifestyle.vn
  license:
    name: Private
    
servers:
  - url: http://localhost:3000/api/v1
    description: Local Development
  - url: https://api-staging.lifestyle.vn/v1
    description: Staging
  - url: https://api.lifestyle.vn/v1
    description: Production

# =============================================================================
# TAGS (Nhóm API)
# =============================================================================
tags:
  - name: Auth
    description: Đăng ký, Đăng nhập, Quản lý token
  - name: Users
    description: Hồ sơ người dùng, Địa chỉ, Preferences
  - name: Drivers
    description: Đăng ký tài xế, Hồ sơ, Xe cộ, Trạng thái
  - name: Merchants
    description: Quản lý cửa hàng, Nhân viên
  - name: Wallets
    description: Ví Lifestyle - Số dư, Xu, Lịch sử
  - name: Payments
    description: Nạp tiền, Thanh toán, Rút tiền, Webhooks
  - name: Spotlight
    description: Redcomments, Reviews, Creators (KOC)
  - name: Loyalty
    description: Lifestyle Xu, Referral, Rewards
  - name: Admin
    description: Admin Operations (Ops Dashboard)

# =============================================================================
# SECURITY
# =============================================================================
security:
  - BearerAuth: []

# =============================================================================
# PATHS (API Endpoints)
# =============================================================================
paths:

  # ===========================================================================
  # AUTH
  # ===========================================================================
  
  /auth/register:
    post:
      tags: [Auth]
      summary: Đăng ký tài khoản mới
      description: |
        Tạo tài khoản mới bằng email + password hoặc số điện thoại.
        Tự động tạo Wallet cho user.
        Gửi OTP xác thực qua email/SMS.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              email_register:
                summary: Đăng ký bằng email
                value:
                  email: "nguyenvana@gmail.com"
                  password: "SecurePass@123"
                  firstName: "Nguyễn Văn"
                  lastName: "A"
                  phoneNumber: "0901234567"
              phone_register:
                summary: Đăng ký bằng SĐT
                value:
                  phoneNumber: "0901234567"
                  password: "SecurePass@123"
                  firstName: "Nguyễn Văn"
                  lastName: "A"
      responses:
        '201':
          description: Đăng ký thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Email/SĐT đã tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  code: "USER_ALREADY_EXISTS"
                  message: "Email đã được sử dụng"
                  statusCode: 409

  /auth/login:
    post:
      tags: [Auth]
      summary: Đăng nhập
      description: Đăng nhập bằng email/SĐT + password. Trả về access token và refresh token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              email_login:
                summary: Đăng nhập bằng email
                value:
                  email: "nguyenvana@gmail.com"
                  password: "SecurePass@123"
              phone_login:
                summary: Đăng nhập bằng SĐT
                value:
                  phoneNumber: "0901234567"
                  password: "SecurePass@123"
      responses:
        '200':
          description: Đăng nhập thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Sai mật khẩu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  code: "INVALID_CREDENTIALS"
                  message: "Email hoặc mật khẩu không đúng"
                  statusCode: 401

  /auth/login/social:
    post:
      tags: [Auth]
      summary: Đăng nhập bằng mạng xã hội
      description: |
        Đăng nhập hoặc đăng ký bằng Google/Facebook/Apple/Zalo.
        Nếu chưa có tài khoản, tự động tạo mới.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialLoginRequest'
            example:
              provider: "google"
              accessToken: "ya29.a0AfH6SM..."
      responses:
        '200':
          description: Đăng nhập thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/send-otp:
    post:
      tags: [Auth]
      summary: Gửi OTP xác thực
      description: Gửi mã OTP qua SMS hoặc Email để xác thực số điện thoại/email.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target, type]
              properties:
                target:
                  type: string
                  description: Email hoặc SĐT
                  example: "0901234567"
                type:
                  type: string
                  enum: [SMS, EMAIL]
                  example: "SMS"
                purpose:
                  type: string
                  enum: [REGISTER, LOGIN, RESET_PASSWORD, VERIFY_PHONE]
                  example: "REGISTER"
      responses:
        '200':
          description: OTP đã gửi
          content:
            application/json:
              example:
                success: true
                message: "OTP đã gửi đến 090****567"
                data:
                  expiresIn: 300
                  retryAfter: 60

  /auth/verify-otp:
    post:
      tags: [Auth]
      summary: Xác thực OTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target, otp]
              properties:
                target:
                  type: string
                  example: "0901234567"
                otp:
                  type: string
                  example: "123456"
      responses:
        '200':
          description: Xác thực thành công
          content:
            application/json:
              example:
                success: true
                message: "Xác thực thành công"
                data:
                  verified: true

  /auth/refresh-token:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: Dùng refresh token để lấy access token mới khi token cũ hết hạn.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  example: "eyJhbGciOiJIUzI1NiIs..."
      responses:
        '200':
          description: Token mới
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Refresh token không hợp lệ hoặc đã hết hạn

  /auth/logout:
    post:
      tags: [Auth]
      summary: Đăng xuất
      description: Revoke refresh token, xóa session.
      responses:
        '200':
          description: Đăng xuất thành công
          content:
            application/json:
              example:
                success: true
                message: "Đăng xuất thành công"

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Quên mật khẩu
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: "nguyenvana@gmail.com"
      responses:
        '200':
          description: Link reset password đã gửi qua email

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Đặt lại mật khẩu
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Mật khẩu đã cập nhật

  # ===========================================================================
  # USERS
  # ===========================================================================

  /users/me:
    get:
      tags: [Users]
      summary: Lấy thông tin user hiện tại
      description: Trả về profile đầy đủ của user đang đăng nhập, bao gồm wallet balance.
      responses:
        '200':
          description: Thông tin user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    patch:
      tags: [Users]
      summary: Cập nhật thông tin cá nhân
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
            example:
              displayName: "Nguyễn Văn A"
              gender: "MALE"
              dateOfBirth: "1995-06-15"
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
                  description: Upload ảnh đại diện
      responses:
        '200':
          description: Cập nhật thành công

  /users/me/avatar:
    put:
      tags: [Users]
      summary: Upload/Thay đổi avatar
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar đã cập nhật
          content:
            application/json:
              example:
                success: true
                data:
                  avatarUrl: "https://cdn.lifestyle.vn/avatars/user-abc123.jpg"

  /users/me/preferences:
    put:
      tags: [Users]
      summary: Cập nhật preferences (Language, Theme, Notifications)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPreferences'
            example:
              language: "vi"
              currency: "VND"
              theme: "DARK"
              notifications:
                email: true
                push: true
                sms: false
      responses:
        '200':
          description: Preferences đã cập nhật

  /users/me/change-password:
    post:
      tags: [Users]
      summary: Đổi mật khẩu
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Mật khẩu đã cập nhật
        '400':
          description: Mật khẩu hiện tại không đúng

  # --- User Addresses ---

  /users/me/addresses:
    get:
      tags: [Users]
      summary: Lấy danh sách địa chỉ đã lưu
      responses:
        '200':
          description: Danh sách địa chỉ
          content:
            application/json:
              example:
                success: true
                data:
                  - id: "uuid-addr-1"
                    label: "Nhà"
                    fullAddress: "456 Lý Thường Kiệt, P.14, Q.10, TP.HCM"
                    latitude: 10.7721
                    longitude: 106.6602
                    isDefault: true
                  - id: "uuid-addr-2"
                    label: "Công ty"
                    fullAddress: "789 Điện Biên Phủ, P.25, Q.Bình Thạnh, TP.HCM"
                    latitude: 10.8010
                    longitude: 106.7120
                    isDefault: false
    
    post:
      tags: [Users]
      summary: Thêm địa chỉ mới
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAddressRequest'
            example:
              label: "Nhà bạn"
              street: "100 Nguyễn Du"
              ward: "Phường Bến Thành"
              district: "Quận 1"
              city: "TP. Hồ Chí Minh"
              latitude: 10.7756
              longitude: 106.6990
              isDefault: false
      responses:
        '201':
          description: Địa chỉ đã thêm

  /users/me/addresses/{addressId}:
    parameters:
      - name: addressId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    put:
      tags: [Users]
      summary: Cập nhật địa chỉ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAddressRequest'
      responses:
        '200':
          description: Địa chỉ đã cập nhật
    
    delete:
      tags: [Users]
      summary: Xóa địa chỉ
      responses:
        '200':
          description: Địa chỉ đã xóa

  # ===========================================================================
  # DRIVERS
  # ===========================================================================
  
  /drivers/register:
    post:
      tags: [Drivers]
      summary: Đăng ký làm tài xế
      description: |
        User hiện tại đăng ký trở thành tài xế.
        Khởi tạo hồ sơ tài xế với trạng thái PENDING_VERIFICATION.
        Bắt đầu quy trình onboarding 8 bước.
      responses:
        '201':
          description: Đăng ký thành công, bắt đầu onboarding
          content:
            application/json:
              example:
                success: true
                data:
                  driverId: "uuid-driver-1"
                  driverNumber: "LS-DRV-00002"
                  status: "PENDING_VERIFICATION"
                  onboardingStep: 1
                  message: "Chào mừng! Hãy hoàn thành hồ sơ để bắt đầu nhận chuyến."
        '409':
          description: Đã đăng ký tài xế rồi

  /drivers/me:
    get:
      tags: [Drivers]
      summary: Lấy hồ sơ tài xế hiện tại
      description: Trả về thông tin tài xế, xe, giấy tờ, thống kê, thu nhập.
      responses:
        '200':
          description: Hồ sơ tài xế
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverProfileResponse'

  /drivers/me/identity:
    post:
      tags: [Drivers]
      summary: Nộp giấy tờ tùy thân (CCCD, GPLX, Lý lịch tư pháp)
      description: |
        Upload giấy tờ cho bước xác minh. Bao gồm:
        - CCCD (mặt trước + sau)
        - Ảnh chân dung (sinh trắc học)
        - Giấy phép lái xe
        - Lý lịch tư pháp
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DriverIdentityRequest'
      responses:
        '200':
          description: Giấy tờ đã nộp, chờ xác minh
        '400':
          description: Thiếu giấy tờ bắt buộc

  /drivers/me/vehicle:
    post:
      tags: [Drivers]
      summary: Đăng ký phương tiện
      description: |
        Upload thông tin xe: loại xe, biển số, hình ảnh 4 góc,
        đăng ký xe, bảo hiểm TNDS.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VehicleRegistrationRequest'
      responses:
        '201':
          description: Phương tiện đã đăng ký
    
    get:
      tags: [Drivers]
      summary: Lấy thông tin xe hiện tại
      responses:
        '200':
          description: Thông tin xe

  /drivers/me/status:
    patch:
      tags: [Drivers]
      summary: Thay đổi trạng thái online/offline
      description: Bật/tắt nhận chuyến.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [onlineStatus]
              properties:
                onlineStatus:
                  type: string
                  enum: [ONLINE, OFFLINE]
            example:
              onlineStatus: "ONLINE"
      responses:
        '200':
          description: Trạng thái đã cập nhật

  /drivers/me/location:
    put:
      tags: [Drivers]
      summary: Cập nhật vị trí hiện tại (real-time)
      description: Driver app gọi mỗi 5-10 giây khi online.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [latitude, longitude]
              properties:
                latitude:
                  type: number
                  format: double
                  example: 10.7769
                longitude:
                  type: number
                  format: double
                  example: 106.7009
                heading:
                  type: number
                  description: Hướng di chuyển (0-360 độ)
                speed:
                  type: number
                  description: Tốc độ (km/h)
      responses:
        '200':
          description: Vị trí đã cập nhật

  /drivers/me/earnings:
    get:
      tags: [Drivers]
      summary: Lấy thống kê thu nhập
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month, custom]
            default: today
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Thống kê thu nhập
          content:
            application/json:
              example:
                success: true
                data:
                  period: "today"
                  totalEarnings: 850000
                  totalTrips: 12
                  totalDistance: 45.5
                  avgRating: 4.9
                  breakdown:
                    baseFare: 600000
                    tips: 100000
                    bonuses: 150000
                    deductions: 0

  /drivers/me/stats:
    get:
      tags: [Drivers]
      summary: Lấy thống kê tổng quan
      responses:
        '200':
          description: Thống kê tài xế
          content:
            application/json:
              example:
                success: true
                data:
                  totalTrips: 152
                  totalDistanceKm: 3250.5
                  rating: 4.85
                  totalRatings: 148
                  acceptanceRate: 95.5
                  cancellationRate: 2.1
                  totalEarnings: 25000000
                  currentBalance: 3500000
                  onboardingCompleted: true

  # ===========================================================================
  # MERCHANTS
  # ===========================================================================

  /merchants/register:
    post:
      tags: [Merchants]
      summary: Đăng ký cửa hàng/quán mới
      description: |
        User đăng ký trở thành đối tác bán hàng.
        Tự động tạo merchant profile với trạng thái PENDING.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MerchantRegisterRequest'
            example:
              name: "Phở Nguyễn - Phở Bò Truyền Thống"
              type: "RESTAURANT"
              description: "Quán phở gia truyền 3 đời"
              phone: "0945678901"
              email: "quanpho@gmail.com"
              street: "123 Nguyễn Huệ"
              ward: "Phường Bến Nghé"
              district: "Quận 1"
              city: "TP. Hồ Chí Minh"
              latitude: 10.7731
              longitude: 106.7030
      responses:
        '201':
          description: Đăng ký thành công, chờ duyệt

  /merchants/{merchantId}:
    parameters:
      - $ref: '#/components/parameters/MerchantId'
    
    get:
      tags: [Merchants]
      summary: Lấy thông tin cửa hàng (public)
      security: []
      responses:
        '200':
          description: Thông tin cửa hàng
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantPublicProfile'
    
    patch:
      tags: [Merchants]
      summary: Cập nhật thông tin cửa hàng (Owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMerchantRequest'
      responses:
        '200':
          description: Đã cập nhật

  /merchants/{merchantId}/business-hours:
    parameters:
      - $ref: '#/components/parameters/MerchantId'
    put:
      tags: [Merchants]
      summary: Cập nhật giờ mở cửa
      requestBody:
        required: true
        content:
          application/json:
            example:
              monday: { isOpen: true, openTime: "08:00", closeTime: "22:00" }
              tuesday: { isOpen: true, openTime: "08:00", closeTime: "22:00" }
              sunday: { isOpen: true, openTime: "09:00", closeTime: "21:00" }
      responses:
        '200':
          description: Giờ mở cửa đã cập nhật

  /merchants/{merchantId}/staff:
    parameters:
      - $ref: '#/components/parameters/MerchantId'
    
    get:
      tags: [Merchants]
      summary: Danh sách nhân viên cửa hàng
      responses:
        '200':
          description: Danh sách nhân viên
    
    post:
      tags: [Merchants]
      summary: Thêm nhân viên
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, role]
              properties:
                userId:
