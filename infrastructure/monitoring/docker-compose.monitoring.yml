networks:
  lifestyle_network:
    external: true
    name: docker_lifestyle_network

services:
  # ========== Prometheus ==========
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: lifestyle_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - lifestyle_network

  # ========== Grafana ==========
  grafana:
    image: grafana/grafana:10.4.0
    container_name: lifestyle_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-LifestyleGrafana2026}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: https://monitor.vmd.asia
      GF_SERVER_DOMAIN: monitor.vmd.asia
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3333:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - lifestyle_network

  # ========== Node Exporter (host metrics) ==========
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: lifestyle_node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks:
      - lifestyle_network

  # ========== cAdvisor (container metrics) ==========
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: lifestyle_cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - lifestyle_network

  # ========== PostgreSQL Exporter ==========
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: lifestyle_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${DATABASE_USER:-lifestyle_admin}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME:-lifestyle_db}?sslmode=disable"
    ports:
      - "9187:9187"
    restart: unless-stopped
    networks:
      - lifestyle_network

  # ========== Redis Exporter ==========
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: lifestyle_redis_exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    ports:
      - "9121:9121"
    restart: unless-stopped
    networks:
      - lifestyle_network

  # ========== Nginx Exporter ==========
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1
    container_name: lifestyle_nginx_exporter
    command:
      - '--nginx.scrape-uri=http://nginx:80/nginx_status'
    ports:
      - "9113:9113"
    restart: unless-stopped
    networks:
      - lifestyle_network

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
